<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-Bot | Real-Time Active Inference Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="container">
        <div class="header">
            <h1>SENTINEL-BOT WAF</h1>
            <p>Operational Node: Real-Time Mitigation & Inference Engine</p>
        </div>

        <div class="card">
            <h2>Active perimeter verification</h2>
            <p>Fill out the parameters naturally to validate identity metrics against the stacked ensemble boundaries.</p>
            
            <form id="interactionForm">
                <input type="text" id="username" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <textarea id="message" placeholder="Type a short paragraph about your day..." required rows="5"></textarea>
                
                <button type="button" id="downloadBtn" class="submit-btn">
                    Execute Active Verification
                </button>
            </form>
            
            <div id="statusMessage" style="margin-top: 15px; font-weight: bold; transition: all 0.3s ease;"></div>
        </div>
    </div>

    <script src="inference_collector.js"></script>
</body>
</html>
